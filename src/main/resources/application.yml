# order-service → 8081 | inventory-service → 8082 | user-service → 8083
server:
  port: 8081
  forward-headers-strategy: framework  # If behind proxy
  servlet:
    session:
      cookie:
        same-site: lax     # Avoid SameSite issues
        secure: false      # Only true if using HTTPS

spring:
  thymeleaf:
    cache: false        # Disable caching for development
    prefix: classpath:/templates/
    suffix: .html
  application:
    name: order-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://mysql:3306/orders?createDatabaseIfNotExist=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: YOUR_CLIENT_ID
            client-secret: YOUR_CLIENT_SECRET
            scope: read:user, user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/github"
            client-name: GitHub
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
api:
  prefix: /oms/v1

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/   # hostname matches docker-compose service name
  instance:
    prefer-ip-address: true


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans